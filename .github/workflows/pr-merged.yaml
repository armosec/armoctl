name: build
on:
    pull_request_target:
        types: [closed]
        branches:
            - "main"
        paths-ignore:
            - "**.md"
            - ".github/workflows/*"

    workflow_dispatch:

jobs:
    release:
        if: >
            ${{
              github.event.pull_request.merged == true &&
              contains(github.event.pull_request.labels.*.name, 'release') &&
              github.repository_owner == 'armosec'
            }}
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: write

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get build number
              id: get-build
              uses: mlilback/build-number@v1
              with:
                  base: 0
                  run-id: ${{ github.run_number }}

            - name: Create Git Tag
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      github.rest.git.createRef({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: `refs/tags/v0.0.${process.env.BUILD_NUMBER}`,
                        sha: context.sha
                      });

            - uses: actions/setup-go@v5
              with:
                  go-version: "1.25"

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@v6
              with:
                  version: "~> v2"
                  args: release --clean
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: eu-north-1

            - name: Upload armoctl artifacts to S3
              run: |
                  echo "Uploading armoctl artifacts to S3..."
                  for os in linux darwin; do
                    for arch in amd64 arm64; do
                      artifact="dist/armoctl_${os}_${arch}_v1/armoctl"
                      if [ -f "$artifact" ]; then
                        # Versioned release
                        aws s3 cp "$artifact" \
                          "s3://armo-host-agent-publish-repository/armoctl/releases/v0.0.${BUILD_NUMBER}/armoctl_${os}_${arch}"
                        # Latest alias
                        aws s3 cp "$artifact" \
                          "s3://armo-host-agent-publish-repository/armoctl/armoctl_latest_${os}_${arch}"
                      else
                        echo "Warning: $artifact not found, skipping"
                      fi
                    done
                  done

                  echo "Uploading armoctl install.sh to S3..."
                  aws s3 cp cmd/armoctl/install.sh \
                    s3://armo-host-agent-publish-repository/armoctl/install.sh

            - name: Invalidate CloudFront cache
              run: |
                  echo "Invalidating CloudFront cache for latest aliases..."
                  aws cloudfront create-invalidation \
                    --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
                    --paths "/armoctl/armoctl_latest_*" "/armoctl/install.sh"

            - name: Publish Release
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const { owner, repo } = context.repo;
                      const releases = await github.rest.repos.listReleases({ owner, repo });
                      const release = releases.data.find(r => r.tag_name === `v0.0.${process.env.BUILD_NUMBER}`);
                      await github.rest.repos.updateRelease({ owner, repo, release_id: release.id, draft: false });
