name: build
on:
    pull_request_target:
        types: [closed]
        branches:
            - "main"
        paths-ignore:
            - "**.md"

    workflow_dispatch:

jobs:
    release:
        if: >
            ${{
              github.event.pull_request.merged == true &&
              contains(github.event.pull_request.labels.*.name, 'release') &&
              github.repository_owner == 'armosec'
            }}
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: write

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-go@v5
              with:
                  go-version: "1.26.0"

            - name: Verify generated skill docs are fresh
              run: make verify-skill-docs

            - name: Get next version
              id: version
              run: |
                  LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
                  if [ -z "$LATEST_TAG" ]; then
                    NEXT_TAG="v0.0.1"
                  else
                    MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1)
                    MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
                    PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
                    NEXT_TAG="${MAJOR}.${MINOR}.$((PATCH + 1))"
                  fi
                  echo "tag=${NEXT_TAG}" >> $GITHUB_OUTPUT
                  echo "Next version: ${NEXT_TAG}"

            - name: Bump plugin manifests to ${{ steps.version.outputs.tag }}
              run: |
                  NEW="${{ steps.version.outputs.tag }}"
                  # Strip leading 'v' if present
                  NEW="${NEW#v}"
                  jq --arg v "$NEW" '.version = $v' .claude-plugin/plugin.json > .claude-plugin/plugin.json.tmp
                  mv .claude-plugin/plugin.json.tmp .claude-plugin/plugin.json
                  jq --arg v "$NEW" '(.plugins[] | select(.name=="armoctl") | .version) = $v' .claude-plugin/marketplace.json > .claude-plugin/marketplace.json.tmp
                  mv .claude-plugin/marketplace.json.tmp .claude-plugin/marketplace.json
                  jq --arg v "$NEW" '.version = $v' gemini-extension.json > gemini-extension.json.tmp
                  mv gemini-extension.json.tmp gemini-extension.json
                  if git diff --quiet -- .claude-plugin/ gemini-extension.json; then
                    echo "No manifest changes needed"
                  else
                    git config user.name "armo-release-bot"
                    git config user.email "release@armosec.io"
                    git add .claude-plugin/plugin.json .claude-plugin/marketplace.json gemini-extension.json
                    git commit -m "chore: bump plugin manifests to v$NEW"
                    git push
                  fi

            - name: Create Git Tag
              run: git tag "${{ steps.version.outputs.tag }}"

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@v6
              with:
                  version: "~> v2"
                  args: release --clean
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: arn:aws:iam::057134155174:role/GithubActionsPrivateNodeAgent
                  aws-region: eu-north-1

            - name: Upload armoctl artifacts to S3
              run: |
                  echo "Uploading armoctl artifacts to S3..."
                  jq -r '.[] | select(.type == "Binary") | [.path, .goos, .goarch, .extra.Ext] | @tsv' dist/artifacts.json | \
                  while IFS=$'\t' read -r path goos goarch ext; do
                    echo "Uploading ${goos}/${goarch}..."
                    aws s3 cp "$path" \
                      "s3://armo-host-agent-publish-repository/armoctl/releases/${{ steps.version.outputs.tag }}/armoctl_${goos}_${goarch}${ext}"
                    aws s3 cp "$path" \
                      "s3://armo-host-agent-publish-repository/armoctl/armoctl_latest_${goos}_${goarch}${ext}"
                  done

                  echo "Uploading armoctl install.sh to S3..."
                  aws s3 cp install.sh \
                    s3://armo-host-agent-publish-repository/armoctl/install.sh

            - name: Invalidate CloudFront cache
              run: |
                  echo "Invalidating CloudFront cache for latest aliases..."
                  aws cloudfront create-invalidation \
                    --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
                    --paths "/armoctl/armoctl_latest_*" "/armoctl/install.sh"

            - name: Publish Release
              uses: actions/github-script@v7
              env:
                  RELEASE_TAG: ${{ steps.version.outputs.tag }}
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const { owner, repo } = context.repo;
                      const releases = await github.rest.repos.listReleases({ owner, repo });
                      const release = releases.data.find(r => r.tag_name === process.env.RELEASE_TAG);
                      await github.rest.repos.updateRelease({ owner, repo, release_id: release.id, draft: false });
